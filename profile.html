<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kundprofil - Virea AB</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        .profile-header {
            background: #161822;
            margin: 24px 32px;
            border-radius: 10px;
            border: 1px solid #252836;
            padding: 32px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .profile-title { font-size: 24px; font-weight: 700; margin-bottom: 6px; color: #e0e0e8; }
        .profile-subtitle { font-size: 14px; color: #6b7280; }
        .profile-actions { display: flex; gap: 10px; }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin: 0 32px 24px;
        }
        .info-card {
            background: #161822;
            border-radius: 10px;
            border: 1px solid #252836;
            padding: 24px;
        }
        .info-card h3 {
            font-size: 13px;
            color: #8b8fa4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 14px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #252836;
            font-size: 14px;
            color: #c0c4d4;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #8b8fa4; }
        .info-value { font-weight: 600; color: #e0e0e8; }
        .info-value a { color: #818cf8; text-decoration: none; }
        .info-value a:hover { text-decoration: underline; color: #a5b4fc; }

        .notes-section {
            background: #161822;
            margin: 0 32px 32px;
            border-radius: 10px;
            border: 1px solid #252836;
            padding: 24px;
        }
        .notes-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            color: #e0e0e8;
        }
        .note-input {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .note-input textarea {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid #303348;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            min-height: 60px;
            background: #1e2030;
            color: #e0e0e8;
        }
        .note-input textarea:focus { border-color: #6366f1; outline: none; }
        .note-input button {
            align-self: flex-end;
            padding: 10px 20px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }
        .note-input button:hover { background: #5558e6; }

        .note-item {
            padding: 14px 0;
            border-bottom: 1px solid #252836;
        }
        .note-item:last-child { border-bottom: none; }
        .note-meta {
            font-size: 12px;
            color: #6b7280;
            margin-bottom: 4px;
        }
        .note-text { font-size: 14px; line-height: 1.5; color: #c0c4d4; }
        .no-notes { color: #6b7280; font-size: 14px; font-style: italic; }
    </style>
</head>
<body>

<div class="profile-header" id="profileHeader">
    <div>
        <div class="profile-title" id="storeName">Laddar...</div>
        <div class="profile-subtitle" id="storeLocation"></div>
    </div>
    <div class="profile-actions">
        <a href="index.html" class="add-btn" style="background:rgba(99,102,241,0.15);color:#818cf8;text-decoration:none;">Tillbaka</a>
        <button class="add-btn" onclick="editInModal()">Redigera</button>
        <button class="add-btn" style="background:rgba(34,197,94,0.15);color:#4ade80;" onclick="moveToClients()">Flytta till Våra butiker</button>
    </div>
</div>

<div class="info-grid">
    <div class="info-card">
        <h3>Kontaktinfo</h3>
        <div id="contactInfo"></div>
    </div>
    <div class="info-card">
        <h3>Försäljningsinfo</h3>
        <div id="salesInfo"></div>
    </div>
    <div class="info-card">
        <h3>Plats</h3>
        <div id="locationInfo"></div>
    </div>
</div>

<div class="notes-section">
    <h3>Anteckningar</h3>
    <div class="note-input">
        <textarea id="noteText" placeholder="Skriv en anteckning..."></textarea>
        <button onclick="addNote()">Lägg till</button>
    </div>
    <div id="notesList"></div>
</div>

<script src="auth.js"></script>
<script src="nav.js"></script>
<script>
const currentUser = requireAuth();
renderNav('prospects');

const STORAGE_KEY = 'claude-salj-customers-v4';
const NOTES_KEY = 'claude-salj-notes';

const params = new URLSearchParams(window.location.search);
const storeId = parseInt(params.get('id'));

let customers = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
let allNotes = JSON.parse(localStorage.getItem(NOTES_KEY) || '{}');

const store = customers.find(c => c.id === storeId);

if (!store) {
    document.getElementById('storeName').textContent = 'Butik hittades inte';
} else {
    document.title = store.name + ' - Virea AB';
    document.getElementById('storeName').textContent = store.name;
    document.getElementById('storeLocation').textContent = `${store.address || ''}, ${store.city}`;

    const mapsLink = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(store.name + ', ' + (store.address || '') + ', ' + store.city)}`;

    document.getElementById('contactInfo').innerHTML = `
        <div class="info-row"><span class="info-label">Telefon</span><span class="info-value">${escHtml(store.phone || '-')}</span></div>
        <div class="info-row"><span class="info-label">Email</span><span class="info-value">${store.email ? `<a href="mailto:${escHtml(store.email)}">${escHtml(store.email)}</a>` : '-'}</span></div>
        <div class="info-row"><span class="info-label">Kontaktad av</span><span class="info-value">${escHtml(store.contactedBy || '-')}</span></div>
    `;

    document.getElementById('salesInfo').innerHTML = `
        <div class="info-row"><span class="info-label">Status</span><span class="info-value"><span class="status ${store.status.toLowerCase()}">${escHtml(store.status)}</span></span></div>
        <div class="info-row"><span class="info-label">Omsättning</span><span class="info-value">${(store.revenue || 0).toLocaleString('sv-SE')} kr</span></div>
        <div class="info-row"><span class="info-label">Kommentar</span><span class="info-value">${escHtml(store.comment || '-')}</span></div>
    `;

    document.getElementById('locationInfo').innerHTML = `
        <div class="info-row"><span class="info-label">Adress</span><span class="info-value">${escHtml(store.address || '-')}</span></div>
        <div class="info-row"><span class="info-label">Stad</span><span class="info-value">${escHtml(store.city)}</span></div>
        <div class="info-row"><span class="info-label">Karta</span><span class="info-value"><a href="${mapsLink}" target="_blank" rel="noopener">Öppna i Google Maps</a></span></div>
    `;
}

function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function editInModal() {
    window.location.href = `index.html?edit=${storeId}`;
}

function moveToClients() {
    if (!store) return;
    if (!confirm(`Flytta "${store.name}" till Våra butiker?`)) return;

    const CLIENTS_KEY = 'claude-salj-clients-v1';
    let clients = JSON.parse(localStorage.getItem(CLIENTS_KEY) || '[]');
    const newId = clients.length ? Math.max(...clients.map(x => x.id)) + 1 : 1;
    clients.push({
        id: newId,
        name: store.name,
        city: store.city,
        address: store.address || '',
        contactPerson: store.contactedBy || '',
        phone: store.phone || '',
        email: store.email || '',
        revenue: 0,
        startDate: new Date().toISOString().split('T')[0],
        comment: store.comment || ''
    });
    localStorage.setItem(CLIENTS_KEY, JSON.stringify(clients));

    customers = customers.filter(x => x.id !== storeId);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(customers));

    window.location.href = 'clients.html';
}

// --- Notes ---
function getStoreNotes() {
    return allNotes[storeId] || [];
}

function saveNotes() {
    localStorage.setItem(NOTES_KEY, JSON.stringify(allNotes));
}

function addNote() {
    const text = document.getElementById('noteText').value.trim();
    if (!text) return;

    if (!allNotes[storeId]) allNotes[storeId] = [];
    allNotes[storeId].unshift({
        text,
        author: currentUser.name,
        date: new Date().toISOString()
    });
    saveNotes();
    document.getElementById('noteText').value = '';
    renderNotes();
}

function renderNotes() {
    const notes = getStoreNotes();
    const container = document.getElementById('notesList');

    if (notes.length === 0) {
        container.innerHTML = '<div class="no-notes">Inga anteckningar ännu</div>';
        return;
    }

    container.innerHTML = notes.map(n => {
        const date = new Date(n.date);
        const dateStr = date.toLocaleDateString('sv-SE') + ' ' + date.toLocaleTimeString('sv-SE', { hour: '2-digit', minute: '2-digit' });
        return `
        <div class="note-item">
            <div class="note-meta">${escHtml(n.author)} - ${dateStr}</div>
            <div class="note-text">${escHtml(n.text)}</div>
        </div>`;
    }).join('');
}

renderNotes();
</script>

</body>
</html>
