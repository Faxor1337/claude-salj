<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Butiksförsäljning Virea AB</title>
    <link rel="stylesheet" href="shared.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1117;
            color: #e0e0e8;
        }

        header {
            background: #1a1a2e;
            color: #fff;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 { font-size: 22px; font-weight: 600; }

        .nav-links {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-btn {
            padding: 9px 18px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
            border: none;
            text-decoration: none;
            display: inline-block;
        }

        .btn-primary { background: #6366f1; color: #fff; }
        .btn-primary:hover { background: #5558e6; }
        .btn-back { background: rgba(99,102,241,0.15); color: #818cf8; }
        .btn-danger { background: #f87171; color: #fff; }
        .btn-danger:hover { background: #ef4444; }
        .btn-danger-sm {
            background: rgba(239,68,68,0.12);
            color: #f87171;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            font-size: 12px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-danger-sm:hover { background: rgba(239,68,68,0.2); }

        .user-info { font-size: 13px; color: #6b7280; }

        .container {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 32px;
        }

        .card {
            background: #161822;
            border-radius: 10px;
            border: 1px solid #252836;
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px;
            border-bottom: 1px solid #252836;
        }

        .card-header h2 { font-size: 17px; font-weight: 600; color: #e0e0e8; }

        table { width: 100%; border-collapse: collapse; }

        th {
            text-align: left;
            padding: 12px 24px;
            font-size: 12px;
            font-weight: 600;
            color: #8b8fa4;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: #1a1c2e;
            border-bottom: 1px solid #252836;
        }

        td {
            padding: 14px 24px;
            font-size: 14px;
            border-bottom: 1px solid #252836;
            color: #c0c4d4;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(99,102,241,0.06); }

        .role-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .role-badge.admin { background: rgba(234,179,8,0.12); color: #facc15; }
        .role-badge.user { background: rgba(99,102,241,0.15); color: #818cf8; }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: #161822;
            border-radius: 12px;
            border: 1px solid #252836;
            padding: 28px;
            width: 420px;
            max-width: 90vw;
        }

        .modal h3 { margin-bottom: 20px; font-size: 18px; color: #e0e0e8; }

        .modal label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #8b8fa4;
            margin-bottom: 4px;
            margin-top: 14px;
        }

        .modal input, .modal select {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #303348;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            background: #1e2030;
            color: #e0e0e8;
        }

        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
        }

        .modal-actions button {
            padding: 9px 20px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .btn-cancel { background: #252836; border: none; color: #c0c4d4; }
        .btn-save { background: #6366f1; border: none; color: #fff; }
        .btn-save:hover { background: #5558e6; }

        .stat-row {
            display: flex;
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #161822;
            border-radius: 10px;
            padding: 20px 28px;
            flex: 1;
            border: 1px solid #252836;
        }

        .stat-card .label { font-size: 13px; color: #8b8fa4; margin-bottom: 4px; }
        .stat-card .value { font-size: 26px; font-weight: 700; color: #e0e0e8; }
    </style>
</head>
<body>

<!-- Nav injected by nav.js -->

<div class="container">
    <div class="stats" style="padding:24px 0;">
        <div class="stat-card">
            <div class="label">Totalt antal användare</div>
            <div class="value" id="totalUsers">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Administratörer</div>
            <div class="value" id="totalAdmins">0</div>
        </div>
        <div class="stat-card">
            <div class="label">Vanliga användare</div>
            <div class="value" id="totalRegular">0</div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>Användare</h2>
            <button class="nav-btn btn-primary" onclick="openAddModal()">+ Ny användare</button>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Namn</th>
                    <th>Användarnamn</th>
                    <th>Roll</th>
                    <th>Åtgärder</th>
                </tr>
            </thead>
            <tbody id="usersTable"></tbody>
        </table>
    </div>
</div>

<!-- Add User Modal -->
<div class="modal-overlay" id="addModal">
    <div class="modal">
        <h3 id="modalTitle">Lägg till användare</h3>
        <label>Namn</label>
        <input type="text" id="f-name" placeholder="Förnamn Efternamn">
        <label>Användarnamn</label>
        <input type="text" id="f-username" placeholder="användarnamn">
        <label>Lösenord</label>
        <input type="password" id="f-password" placeholder="Lösenord">
        <label>Roll</label>
        <select id="f-role">
            <option value="user">Användare</option>
            <option value="admin">Administratör</option>
        </select>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeAddModal()">Avbryt</button>
            <button class="btn-save" onclick="saveUser()">Spara</button>
        </div>
    </div>
</div>

<!-- Edit User Modal -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <h3>Redigera användare</h3>
        <label>Namn</label>
        <input type="text" id="e-name">
        <label>Användarnamn</label>
        <input type="text" id="e-username">
        <label>Nytt lösenord (lämna tomt för att behålla)</label>
        <input type="password" id="e-password" placeholder="Nytt lösenord...">
        <label>Roll</label>
        <select id="e-role">
            <option value="user">Användare</option>
            <option value="admin">Administratör</option>
        </select>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeEditModal()">Avbryt</button>
            <button class="btn-save" onclick="updateUser()">Spara ändringar</button>
        </div>
    </div>
</div>

<script src="auth.js"></script>
<script src="nav.js"></script>
<script>
const admin = requireAdmin();
renderNav('admin');

let editingUserId = null;

function renderUsers() {
    const users = getUsers();
    const tbody = document.getElementById('usersTable');

    tbody.innerHTML = users.map(u => `
        <tr>
            <td><strong>${esc(u.name)}</strong></td>
            <td>${esc(u.username)}</td>
            <td><span class="role-badge ${u.role}">${u.role === 'admin' ? 'Admin' : 'Användare'}</span></td>
            <td>
                <button class="btn-danger-sm" style="background:rgba(99,102,241,0.15);color:#818cf8;margin-right:6px;" onclick="openEditModal(${u.id})">Redigera</button>
                ${u.id !== admin.id ? `<button class="btn-danger-sm" onclick="deleteUser(${u.id})">Ta bort</button>` : '<span style="font-size:12px;color:#6b7280;">Du</span>'}
            </td>
        </tr>
    `).join('');

    // Stats
    document.getElementById('totalUsers').textContent = users.length;
    document.getElementById('totalAdmins').textContent = users.filter(u => u.role === 'admin').length;
    document.getElementById('totalRegular').textContent = users.filter(u => u.role === 'user').length;
}

function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function openAddModal() {
    document.getElementById('f-name').value = '';
    document.getElementById('f-username').value = '';
    document.getElementById('f-password').value = '';
    document.getElementById('f-role').value = 'user';
    document.getElementById('addModal').classList.add('active');
}

function closeAddModal() {
    document.getElementById('addModal').classList.remove('active');
}

function saveUser() {
    const name = document.getElementById('f-name').value.trim();
    const username = document.getElementById('f-username').value.trim().toLowerCase();
    const password = document.getElementById('f-password').value;
    const role = document.getElementById('f-role').value;

    if (!name || !username || !password) {
        alert('Fyll i alla fält');
        return;
    }

    const users = getUsers();

    if (users.some(u => u.username === username)) {
        alert('Användarnamnet är redan taget');
        return;
    }

    const id = users.length ? Math.max(...users.map(u => u.id)) + 1 : 1;
    users.push({ id, username, password, name, role });
    saveUsers(users);
    closeAddModal();
    renderUsers();
}

function openEditModal(id) {
    const users = getUsers();
    const u = users.find(x => x.id === id);
    if (!u) return;
    editingUserId = id;
    document.getElementById('e-name').value = u.name;
    document.getElementById('e-username').value = u.username;
    document.getElementById('e-password').value = '';
    document.getElementById('e-role').value = u.role;
    document.getElementById('editModal').classList.add('active');
}

function closeEditModal() {
    document.getElementById('editModal').classList.remove('active');
    editingUserId = null;
}

function updateUser() {
    if (!editingUserId) return;
    const users = getUsers();
    const u = users.find(x => x.id === editingUserId);
    if (!u) return;

    const name = document.getElementById('e-name').value.trim();
    const username = document.getElementById('e-username').value.trim().toLowerCase();
    const password = document.getElementById('e-password').value;
    const role = document.getElementById('e-role').value;

    if (!name || !username) {
        alert('Namn och användarnamn krävs');
        return;
    }

    if (users.some(x => x.username === username && x.id !== editingUserId)) {
        alert('Användarnamnet är redan taget');
        return;
    }

    u.name = name;
    u.username = username;
    u.role = role;
    if (password) u.password = password;

    saveUsers(users);

    // Update current session if editing self
    if (editingUserId === admin.id) {
        const session = { id: u.id, username: u.username, name: u.name, role: u.role };
        localStorage.setItem(AUTH_KEY, JSON.stringify(session));
        document.getElementById('userInfo').textContent = u.name;
    }

    closeEditModal();
    renderUsers();
}

function deleteUser(id) {
    if (id === admin.id) {
        alert('Du kan inte ta bort dig själv');
        return;
    }

    const users = getUsers();
    const user = users.find(u => u.id === id);
    if (!user) return;

    if (!confirm(`Vill du ta bort användaren "${user.name}" (${user.username})?`)) return;

    const updated = users.filter(u => u.id !== id);
    saveUsers(updated);
    renderUsers();
}

// Close modals on overlay click
document.getElementById('addModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeAddModal(); });
document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeEditModal(); });

renderUsers();
</script>

</body>
</html>
